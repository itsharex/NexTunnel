<svg width="640" height="180" viewBox="0 0 640 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="nextunnelGradientTitle nextunnelGradientDesc">
  <title id="nextunnelGradientTitle">NexTunnel gradient logo</title>
  <desc id="nextunnelGradientDesc">Gradient NexTunnel logo lockup using cyan, data blue and tunnel violet brand colors.</desc>
  <!-- NexTunnel 渐变版 LOGO：使用调色板中的 Nex Cyan、Data Blue、Tunnel Violet。 -->
  <defs>
    <linearGradient id="brandGradient" x1="38" y1="36" x2="560" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00FFFF"/>
      <stop offset="0.52" stop-color="#0000FF"/>
      <stop offset="1" stop-color="#8A2BE2"/>
    </linearGradient>
    <linearGradient id="swooshGradient" x1="32" y1="117" x2="198" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00FFFF" stop-opacity="0.78"/>
      <stop offset="0.54" stop-color="#FEFFFF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#8A2BE2" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="softShadowGradient" x="0" y="0" width="244" height="180" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0000FF" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g filter="url(#softShadowGradient)">
    <path
      d="M43.92 133.6L77.76 38.4H104.56L133.72 98.72L153.04 38.4H188.12L154.28 133.6H126.36L98.44 76.12L79.56 133.6H43.92Z"
      fill="url(#brandGradient)"/>
    <path
      d="M136.84 38.4H230.08L220.36 66.44H190.28L166.52 133.6H131.56L155.32 66.44H127.12L136.84 38.4Z"
      fill="url(#brandGradient)"/>
    <!-- 轨迹强调隧道穿梭速度，浅色主题下保持高辨识度。 -->
    <path
      d="M24.8 112.48C75.68 88.28 126.2 70.76 176.28 59.96C139.2 76.8 103.64 96.52 69.6 119.08L24.8 112.48Z"
      fill="#FEFFFF"
      opacity="0.92"/>
    <path
      d="M57.2 118.72C96.52 91.84 137.96 70.16 181.48 53.64L171.16 75.56C134.24 87.36 99.52 104.32 67 126.4L57.2 118.72Z"
      fill="url(#swooshGradient)"
      opacity="0.9"/>
    <path
      d="M54.08 100.88C91.28 82.64 128.88 69.16 166.88 60.44L162.28 66.76C126 77.12 90.44 91.76 55.56 110.64L54.08 100.88Z"
      fill="#FEFFFF"
      opacity="0.94"/>
    <path
      d="M194.8 53.52L176.92 84.32L170.96 68.64L155.32 62.52L194.8 53.52Z"
      fill="#FEFFFF"/>
    <path
      d="M34.84 128.44C64.8 116.44 94.32 107.68 123.4 102.16"
      stroke="url(#swooshGradient)"
      stroke-width="4.8"
      stroke-linecap="round"/>
  </g>

  <path d="M276 45H276.6V135H276V45Z" fill="#A8A9A9" opacity="0.5"/>
  <text
    x="310"
    y="108"
    fill="url(#brandGradient)"
    font-family="Inter, HarmonyOS Sans, Microsoft YaHei, Arial, sans-serif"
    font-size="58"
    font-weight="800"
    letter-spacing="0">NexTunnel</text>
</svg>
