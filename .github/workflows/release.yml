name: Release

env:
  RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag, for example v0.6.3-alpha'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  desktop-windows:
    name: Desktop Windows installers
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Enable pnpm for installer frontend
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Install desktop frontend dependencies
        working-directory: desktop/frontend
        shell: pwsh
        run: npm ci

      - name: Install installer frontend dependencies
        working-directory: installer/frontend
        shell: pwsh
        run: pnpm install --frozen-lockfile --config.confirmModulesPurge=false

      - name: Package desktop installers
        shell: pwsh
        env:
          NEXTUNNEL_WINTUN_SHA256: ${{ secrets.NEXTUNNEL_WINTUN_SHA256 }}
        run: |
          $arguments = @{
            Version = "$env:RELEASE_VERSION"
            WintunMode = "bundled"
            WintunSha256 = "07c256185d6ee3652e09fa55c0b673e2624b565e02c4b9091c79ca7d2f24ef51"
          }
          if (-not [string]::IsNullOrWhiteSpace($env:NEXTUNNEL_WINTUN_SHA256)) {
            $arguments.WintunSha256 = "$env:NEXTUNNEL_WINTUN_SHA256"
          }
          ./scripts/package-desktop.ps1 @arguments

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          prerelease: ${{ contains(env.RELEASE_VERSION, '-alpha') || contains(env.RELEASE_VERSION, '-beta') || contains(env.RELEASE_VERSION, '-rc') }}
          overwrite_files: true
          files: |
            dist/nextunnel-${{ env.RELEASE_VERSION }}-windows-amd64-installer.exe
            dist/nextunnel-${{ env.RELEASE_VERSION }}-windows-amd64-installer.exe.sha256
            dist/nextunnel-${{ env.RELEASE_VERSION }}-windows-amd64-installer.MANIFEST.txt
            dist/nextunnel-${{ env.RELEASE_VERSION }}-windows-amd64.zip
            dist/nextunnel-${{ env.RELEASE_VERSION }}-windows-amd64.zip.sha256

  desktop-macos:
    name: Desktop macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install desktop frontend dependencies
        working-directory: desktop/frontend
        run: npm ci

      - name: Package macOS DMG
        shell: bash
        run: bash scripts/package-macos.sh --version "$RELEASE_VERSION"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          prerelease: ${{ contains(env.RELEASE_VERSION, '-alpha') || contains(env.RELEASE_VERSION, '-beta') || contains(env.RELEASE_VERSION, '-rc') }}
          overwrite_files: true
          files: |
            dist/nextunnel-${{ env.RELEASE_VERSION }}-darwin-universal.dmg
            dist/nextunnel-${{ env.RELEASE_VERSION }}-darwin-universal.dmg.sha256
            dist/nextunnel-${{ env.RELEASE_VERSION }}-darwin-universal.MANIFEST.txt

  cli-packages:
    name: CLI packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Package CLI
        shell: pwsh
        run: ./scripts/package-cli.ps1 -Version "$env:RELEASE_VERSION"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          prerelease: ${{ contains(env.RELEASE_VERSION, '-alpha') || contains(env.RELEASE_VERSION, '-beta') || contains(env.RELEASE_VERSION, '-rc') }}
          overwrite_files: true
          files: |
            dist/nextunnel-cli-${{ env.RELEASE_VERSION }}-linux-amd64.tar.gz
            dist/nextunnel-cli-${{ env.RELEASE_VERSION }}-linux-amd64.tar.gz.sha256
            dist/nextunnel-cli-${{ env.RELEASE_VERSION }}-linux-arm64.tar.gz
            dist/nextunnel-cli-${{ env.RELEASE_VERSION }}-linux-arm64.tar.gz.sha256
            dist/nextunnel-cli-${{ env.RELEASE_VERSION }}-windows-amd64.zip
            dist/nextunnel-cli-${{ env.RELEASE_VERSION }}-windows-amd64.zip.sha256

  server-packages:
    name: Server packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/web/package-lock.json

      - name: Install dashboard web dependencies
        working-directory: server/web
        shell: pwsh
        run: npm ci

      - name: Package server
        shell: pwsh
        run: ./scripts/package-server.ps1 -Version "$env:RELEASE_VERSION"

      - name: Generate install script checksums
        shell: pwsh
        run: |
          $installShHash = Get-FileHash -Algorithm SHA256 -Path deploy/server/install.sh
          "$($installShHash.Hash.ToLowerInvariant())  install.sh" | Set-Content -Path deploy/server/install.sh.sha256 -Encoding ASCII
          $installPs1Hash = Get-FileHash -Algorithm SHA256 -Path deploy/server/install.ps1
          "$($installPs1Hash.Hash.ToLowerInvariant())  install.ps1" | Set-Content -Path deploy/server/install.ps1.sha256 -Encoding ASCII

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          prerelease: ${{ contains(env.RELEASE_VERSION, '-alpha') || contains(env.RELEASE_VERSION, '-beta') || contains(env.RELEASE_VERSION, '-rc') }}
          overwrite_files: true
          files: |
            dist/nextunnel-server-linux-amd64.tar.gz
            dist/nextunnel-server-linux-amd64.tar.gz.sha256
            dist/nextunnel-server-linux-arm64.tar.gz
            dist/nextunnel-server-linux-arm64.tar.gz.sha256
            dist/nextunnel-server-windows-amd64.zip
            dist/nextunnel-server-windows-amd64.zip.sha256
            deploy/server/install.sh
            deploy/server/install.sh.sha256
            deploy/server/install.ps1
            deploy/server/install.ps1.sha256

  docs:
    name: Documentation site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run docs:build

      - name: Package docs release asset
        shell: bash
        run: |
          mkdir -p dist
          tar -czf "dist/nextunnel-docs-${RELEASE_VERSION}.tar.gz" -C docs/.vitepress/dist .
          (cd dist && sha256sum "nextunnel-docs-${RELEASE_VERSION}.tar.gz" > "nextunnel-docs-${RELEASE_VERSION}.tar.gz.sha256")

      - name: Upload docs release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          prerelease: ${{ contains(env.RELEASE_VERSION, '-alpha') || contains(env.RELEASE_VERSION, '-beta') || contains(env.RELEASE_VERSION, '-rc') }}
          overwrite_files: true
          files: |
            dist/nextunnel-docs-${{ env.RELEASE_VERSION }}.tar.gz
            dist/nextunnel-docs-${{ env.RELEASE_VERSION }}.tar.gz.sha256

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
