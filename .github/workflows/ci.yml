name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: golangci-lint (desktop)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: desktop

      - name: golangci-lint (server)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: server

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            desktop/frontend/package-lock.json
            server/web/package-lock.json

      - name: Install desktop frontend dependencies
        working-directory: desktop/frontend
        run: npm ci

      - name: ESLint desktop frontend
        working-directory: desktop/frontend
        run: npm run lint

      - name: Install server web dependencies
        working-directory: server/web
        run: npm ci

      - name: ESLint server web
        working-directory: server/web
        run: npm run lint

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            desktop/frontend/package-lock.json
            server/web/package-lock.json

      - name: Build Go (server)
        working-directory: server
        run: go list ./... | grep -v '/web/node_modules/' | xargs go build

      - name: Build Go (desktop)
        working-directory: desktop
        run: go list ./... | grep -v '/frontend/node_modules/' | xargs go build

      - name: Build Go (pkg)
        working-directory: pkg
        run: go build ./...

      - name: Vet Go (server)
        working-directory: server
        run: go list ./... | grep -v '/web/node_modules/' | xargs go vet

      - name: Vet Go (desktop)
        working-directory: desktop
        run: go list ./... | grep -v '/frontend/node_modules/' | xargs go vet

      - name: Vet Go (pkg)
        working-directory: pkg
        run: go vet ./...

      - name: Install desktop frontend deps
        working-directory: desktop/frontend
        run: npm ci

      - name: Build desktop frontend
        working-directory: desktop/frontend
        run: npm run build

      - name: Install server web deps
        working-directory: server/web
        run: npm ci

      - name: Build server web
        working-directory: server/web
        run: npm run build

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Test desktop
        working-directory: desktop
        run: go list ./... | grep -v '/frontend/node_modules/' | xargs go test

      - name: Test server
        working-directory: server
        run: go list ./... | grep -v '/web/node_modules/' | xargs go test

      - name: Test pkg
        working-directory: pkg
        run: go test ./...
