version: '3.8'

services:
  relay-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "7000:7000"
      - "7443:7443/udp"
    command:
      - "--control-port"
      - "7000"
      - "--quic-port"
      - "7443"
      - "--bind"
      - "0.0.0.0"
      - "--auth-token"
      - "${RELAY_AUTH_TOKEN:-dev-relay-token}"
      - "--require-auth"
      - "--stats-interval"
      - "30s"
    restart: unless-stopped

  control-plane:
    build:
      context: .
      dockerfile: server/Dockerfile
    entrypoint: ["/app/control-plane"]
    ports:
      - "9090:9090"
    command:
      - "--listen"
      - "0.0.0.0:9090"
      - "--api-token"
      - "${CONTROL_PLANE_API_TOKEN:-dev-control-token}"
      - "--store-path"
      - "/data/control-plane.db"
    volumes:
      - "./server/data:/data"
    restart: unless-stopped

  nat-detector:
    build:
      context: .
      dockerfile: server/Dockerfile
    entrypoint: ["/app/nat-detector"]
    ports:
      - "3478:3478/udp"
    command: ["--primary-addr", "${PRIMARY_IP:-0.0.0.0}", "--alt-addr", "${ALT_IP:-127.0.0.1}", "--port", "3478"]
    restart: unless-stopped
