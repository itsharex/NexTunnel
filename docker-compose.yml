version: '3.8'

services:
  relay-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "7000:7000"
      - "7443:7443/udp"
    command:
      - "--control-port"
      - "7000"
      - "--quic-port"
      - "7443"
      - "--bind"
      - "0.0.0.0"
      - "--auth-token"
      - "${RELAY_AUTH_TOKEN:-dev-relay-token}"
      - "--require-auth"
      - "--stats-interval"
      - "30s"
    restart: unless-stopped

  control-plane:
    build:
      context: .
      dockerfile: server/Dockerfile
    entrypoint: ["/app/control-plane"]
    ports:
      - "9090:9090"
    command:
      - "--listen"
      - "0.0.0.0:9090"
      - "--api-token"
      - "${CONTROL_PLANE_API_TOKEN:-dev-control-token}"
      - "--store-path"
      - "/data/control-plane.db"
    volumes:
      - "./server/data:/data"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: server/Dockerfile
    entrypoint: ["/app/dashboard"]
    ports:
      - "8080:8080"
    command:
      - "--listen"
      - "0.0.0.0:8080"
      - "--secret-key"
      - "${DASHBOARD_SECRET_KEY:-dev-dashboard-secret}"
      - "--admin-user"
      - "${DASHBOARD_ADMIN_USER:-admin}"
      - "--admin-password"
      - "${DASHBOARD_ADMIN_PASSWORD:-dev-dashboard-password}"
      - "--allowed-origins"
      - "${DASHBOARD_ALLOWED_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080}"
      - "--store-path"
      - "/data/dashboard.db"
      - "--static-dir"
      - "/app/web/dashboard"
    volumes:
      - "./server/data:/data"
    restart: unless-stopped

  nat-detector:
    build:
      context: .
      dockerfile: server/Dockerfile
    entrypoint: ["/app/nat-detector"]
    ports:
      - "3478:3478/udp"
    command: ["--primary-addr", "${PRIMARY_IP:-0.0.0.0}", "--alt-addr", "${ALT_IP:-127.0.0.1}", "--port", "3478"]
    restart: unless-stopped
